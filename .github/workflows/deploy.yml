name: Deploy

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - closed
    branches:
      - main

jobs:
  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.merged == true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Upload files to S3 bucket
        run: |
          aws s3 cp public/main.js s3://${{ secrets.S3_BUCKET }}/main.js --content-type application/javascript
          aws s3 cp public/index.html s3://${{ secrets.S3_BUCKET }}/index.html --content-type text/html
          aws s3 cp public/manifest.json s3://${{ secrets.S3_BUCKET }}/manifest.json --content-type application/manifest+json
          aws s3 cp public/icon.icon s3://${{ secrets.S3_BUCKET }}/icon.icon --content-type image/x-icon
          aws s3 cp public/192x192.png s3://${{ secrets.S3_BUCKET }}/192x192.png --content-type image/png
          aws s3 cp public/512x512.png s3://${{ secrets.S3_BUCKET }}/512x512.png --content-type image/png
